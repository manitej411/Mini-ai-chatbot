<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 400px;
  height: 600px;
  background: #fff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  overflow: hidden;
}

.header {
  background: #6c63ff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  background: #f5f5f5;
}

.message {
  margin: 10px 0;
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 15px;
  line-height: 1.4;
}

.user {
  background: #6c63ff;
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 5px;
}

.bot {
  background: #e0e0e0;
  color: #000;
  margin-right: auto;
  border-bottom-left-radius: 5px;
}

.input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #ddd;
}

.input-area input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
}

.input-area button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #6c63ff;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.input-area button:hover {
  background: #574fd6;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">🤖 AI Chatbot</div>

  <div class="chat-box" id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Type a message..."
           onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
async function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (text === "") return;

  addMessage(text, "user");
  input.value = "";

  let res = await fetch("http://127.0.0.1:5000/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });

  let data = await res.json();
  addMessage(data.reply, "bot");
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");
  let msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
